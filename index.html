<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sanitary Inspector Job Profile</title>

<style>

body{
font-family: Arial;
margin:0;
background:#f2f6ff;
}

/* HEADER */

.header{
background:linear-gradient(90deg,#1d5fd1,#4aa3ff);
color:white;
text-align:center;
padding:40px 20px;
}

.header h1{
margin:0;
font-size:35px;
}

.header p{
margin-top:10px;
font-size:18px;
}

/* SEARCH BAR */

.search-box{
text-align:center;
margin:20px;
}

.search-box input{
width:60%;
padding:12px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
}

/* JOB CONTAINER */

.container{
width:85%;
margin:auto;
}

/* JOB CARD */

.job{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.job-info{
display:flex;
align-items:center;
}

.icon{
font-size:35px;
margin-right:15px;
}

.job h2{
margin:0;
font-size:20px;
}

.job p{
margin:5px 0 0;
}

/* BUTTON */

.btn{
background:#28a745;
color:white;
padding:10px 18px;
text-decoration:none;
border-radius:6px;
font-weight:bold;
}

.btn:hover{
background:#1e8a37;
}

/* AD SECTION */

.ad-box{
width:90%;
margin:30px auto;
background:white;
padding:20px;
text-align:center;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* MOBILE RESPONSIVE */

@media (max-width:768px){

.search-box input{
width:90%;
}

.job{
flex-direction:column;
align-items:flex-start;
}

.btn{
margin-top:10px;
}

}

</style>
</head>

<body>

<div class="header">
<h1>Sanitary Inspector Job Profile</h1>
<p>Latest Government Job Notifications & PDFs</p>
</div>

<div class="search-box">
<input type="text" id="searchInput" onkeyup="searchJobs()" placeholder="Search jobs...">
</div>

<!-- AD SPACE -->

<div class="ad-box">
<p>Advertisement</p>
<!-- Google AdSense code will be placed here -->
</div>

<div class="container" id="jobList">

<div class="job">
<div class="job-info">
<div class="icon">🏥</div>
<div>
<h2>NLC HEALTH INSPECTOR VACANCY</h2>
<p>Post: Health Inspector</p>
</div>
</div>
<a class="btn" href="nlc-india-health-inspector-recruitment-2026-notification.pdf" target="_blank">Download PDF</a>
</div>
